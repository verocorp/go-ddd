# Enable the bundled ddd-vet analyzers (the "dddvet" custom linter) in your
# golangci-lint run — in CI and, via the custom binary, in your editor on save.
# This enables dddvet alongside whatever else you run; to try it in isolation,
# add `default: none` under linters.
version: "2"
linters:
  enable:
    - dddvet
  settings:
    custom:
      dddvet:
        type: module
        description: DDD value-object analyzers (ddd-vet)
# ddd-vet reads its exclude list from .go-ddd.yaml at the repo root — the same
# file the standalone `ddd-vet` / `go tool ddd-vet` uses. Excludes are NOT
# duplicated here; .go-ddd.yaml stays the single config source.
